name: mohassibe_mobile
description: تطبيق محاسبة وإدارة الأعمال - Raid
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  intl: ^0.20.2
  mobile_scanner: ^3.5.2
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.0.7
  webview_windows: ^0.4.0
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
