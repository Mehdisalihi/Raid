services:
  - type: web
    name: mohassibe-backend
    env: node
    rootDir: packages/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        sync: false # You will need to enter your Supabase connection string manually in the Render dashboard
